name: Export source snapshot

on:
  push:
    branches:
      - agent/nanobots-2.1-continued
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create source snapshot
        shell: bash
        run: git archive --format=zip --output=Nanobots2-source.zip HEAD

      - name: Upload source snapshot
        uses: actions/upload-artifact@v7
        with:
          name: Nanobots2-source
          path: Nanobots2-source.zip
          archive: false
          if-no-files-found: error
          retention-days: 1
