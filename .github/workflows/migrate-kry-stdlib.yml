name: Apply kry_stdlib migration

on:
  push:
    branches:
      - agent/migrate-to-kry-stdlib
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v7
        with:
          ref: agent/migrate-to-kry-stdlib
          fetch-depth: 0

      - name: Apply dependency migration
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          old_root = '__stdlib2-continued__/'
          new_root = '__kry_stdlib__/'

          changed_imports = []
          for path in root.rglob('*.lua'):
              if '.git' in path.parts or '.github' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8')
              updated = text.replace(old_root, new_root)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed_imports.append(path.as_posix())

          info_path = root / 'info.json'
          info = json.loads(info_path.read_text(encoding='utf-8'))
          info['version'] = '3.4.3'
          dependencies = []
          found = False
          for dependency in info['dependencies']:
              if dependency.startswith('stdlib2-continued'):
                  dependencies.append('kry_stdlib >= 2.2.4')
                  found = True
              else:
                  dependencies.append(dependency)
          if not found:
              raise SystemExit('stdlib2-continued dependency was not found')
          info['dependencies'] = dependencies
          info_path.write_text(json.dumps(info, indent=2) + '\n', encoding='utf-8')

          readme_path = root / 'README.md'
          readme = readme_path.read_text(encoding='utf-8')
          readme = readme.replace('Requires `stdlib2-continued` 2.1.0 or newer', 'Requires `kry_stdlib` 2.2.4 or newer')
          readme = readme.replace('the `stdlib2-continued` dependency and import paths;', 'the `kry_stdlib` dependency and import paths;')
          readme_path.write_text(readme, encoding='utf-8')

          changelog_path = root / 'changelog.txt'
          changelog = changelog_path.read_text(encoding='utf-8')
          entry = '''---------------------------------------------------------------------------------------------------
          Version: 3.4.3
          Date: 2026-07-13
            Changes:
              - Switched the stdlib dependency and import paths to kry_stdlib 2.2.4.
              - Updated validation and Factorio load testing for the maintained stdlib package.
          ---------------------------------------------------------------------------------------------------
          '''
          if 'Version: 3.4.3' not in changelog:
              changelog_path.write_text(entry + changelog, encoding='utf-8')

          validate_path = root / '.github/workflows/validate.yml'
          validate = validate_path.read_text(encoding='utf-8')
          validate = validate.replace('stdlib2-continued >= 2.1.0', 'kry_stdlib >= 2.2.4')
          validate = validate.replace("legacy = ['__' + 'Nanobots2' + '__/', '__' + 'stdlib2' + '__/']", "legacy = ['__' + 'Nanobots2' + '__/', '__' + 'stdlib2' + '__/', '__stdlib2-continued__/']")
          validate_path.write_text(validate, encoding='utf-8')

          load_path = root / '.github/workflows/factorio-load-test.yml'
          load = load_path.read_text(encoding='utf-8')
          old_download = '''          gh release download v2.1.2 \\
            --repo goakiller900/stdlib2 \\
            --pattern 'stdlib2-continued_2.1.2.zip' \\
            --dir mods
          '''
          new_download = '''          curl --fail --location --retry 3 \\
            https://mods.factorio.com/api/mods/kry_stdlib/full \\
            --output /tmp/kry-stdlib.json
          download_url="$(jq -er '.releases[] | select(.version == "2.2.4") | .download_url' /tmp/kry-stdlib.json)"
          curl --fail --location --retry 3 \\
            "https://mods.factorio.com${download_url}" \\
            --output mods/kry_stdlib_2.2.4.zip
          '''
          if old_download not in load:
              raise SystemExit('Expected stdlib GitHub download block was not found')
          load = load.replace(old_download, new_download)
          load = load.replace('"stdlib2-continued"', '"kry_stdlib"')
          load_path.write_text(load, encoding='utf-8')

          if not changed_imports:
              raise SystemExit('No stdlib import paths were changed')
          print(f'Updated {len(changed_imports)} Lua files:')
          print('\n'.join(changed_imports))
          PY

      - name: Validate migration
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes --quiet jq lua5.2
          test "$(jq -r .version info.json)" = "3.4.3"
          jq -e '.dependencies | index("kry_stdlib >= 2.2.4") != null' info.json >/dev/null
          if grep -RIn --exclude-dir=.git --exclude='migrate-kry-stdlib.yml' '__stdlib2-continued__/' .; then
            echo "::error::Old stdlib2-continued imports remain."
            exit 1
          fi
          while IFS= read -r -d '' file; do
            luac5.2 -p "$file"
          done < <(find . -type f -name '*.lua' -not -path './.git/*' -print0)

      - name: Commit migration
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/migrate-kry-stdlib.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Migrate Nanobots to kry_stdlib"
          git push origin HEAD:agent/migrate-to-kry-stdlib
