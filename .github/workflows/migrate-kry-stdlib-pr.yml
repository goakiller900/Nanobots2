name: Apply kry_stdlib migration from PR

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'agent/migrate-to-kry-stdlib' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v7
        with:
          ref: agent/migrate-to-kry-stdlib
          fetch-depth: 0

      - name: Apply migration
        run: python3 .github/migrate-kry-stdlib.py

      - name: Validate migration
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes --quiet jq lua5.2
          test "$(jq -r .version info.json)" = "3.4.3"
          jq -e '.dependencies | index("kry_stdlib >= 2.2.4") != null' info.json >/dev/null
          if grep -RIn --exclude-dir=.git --exclude='migrate-kry-stdlib.yml' --exclude='migrate-kry-stdlib-pr.yml' --exclude='migrate-kry-stdlib.py' '__stdlib2-continued__/' .; then
            echo "::error::Old stdlib2-continued imports remain."
            exit 1
          fi
          while IFS= read -r -d '' file; do
            luac5.2 -p "$file"
          done < <(find . -type f -name '*.lua' -not -path './.git/*' -print0)

      - name: Commit source migration
        shell: bash
        run: |
          set -euo pipefail
          git restore --source=HEAD -- .github/workflows/validate.yml .github/workflows/factorio-load-test.yml
          rm .github/migrate-kry-stdlib.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Migrate Nanobots to kry_stdlib"
          git push origin HEAD:agent/migrate-to-kry-stdlib
