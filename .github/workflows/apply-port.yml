name: Finish Nanobots 2.1 cleanup

on:
  push:
    branches:
      - agent/finish-nanobots-2.1-cleanup
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v7
        with:
          ref: agent/finish-nanobots-2.1-cleanup
          fetch-depth: 0

      - name: Apply completed runtime patch
        shell: bash
        run: |
          set -euo pipefail
          echo "495acb33ceea98e12e49e79916fdfc3f2ce0a9ec2906cfd311dde530ab0e7804  scripts/nanobots.lua" | sha256sum --check
          cat .github/port-patches/nanobots-*.patch > /tmp/nanobots.patch
          echo "80c3a8dc8a04600eaf1bfdd3affe22c8c82cc9f70dd4b1c3d59a3023adfd7d67  /tmp/nanobots.patch" | sha256sum --check
          git apply --check /tmp/nanobots.patch
          git apply /tmp/nanobots.patch
          echo "4aee91f9b933ec3ce9294cc771f694a794ac6d070e1739c73581a92686ce2030  scripts/nanobots.lua" | sha256sum --check

      - name: Remove migration debris
        shell: bash
        run: |
          set -euo pipefail
          rm -rf \
            .github/port-patches \
            .github/workflows/apply-port.yml \
            .github/workflows/export-source.yml \
            .github/workflows/luacheck.yml \
            .port-payload

      - name: Validate cleaned source
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes --quiet jq lua5.2
          test "$(jq -r .name info.json)" = "Nanobots2-continued"
          test "$(jq -r .factorio_version info.json)" = "2.1"
          jq -e '.dependencies | index("stdlib2-continued >= 2.1.0") != null' info.json >/dev/null
          while IFS= read -r -d '' file; do
            luac5.2 -p "$file"
          done < <(find . -type f -name '*.lua' -not -path './.git/*' -print0)
          if grep -RIn --exclude-dir=.git --exclude-dir=.github -E '__Nanobots2__/|__stdlib2__/' .; then
            echo "::error::Legacy mod import paths remain."
            exit 1
          fi
          test ! -e .port-payload
          test ! -e .github/port-patches
          test ! -e .github/workflows/apply-port.yml
          test ! -e .github/workflows/export-source.yml
          test ! -e .github/workflows/luacheck.yml

      - name: Commit clean completed port
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finish Nanobots 2.1 runtime port and remove migration files"
          git push origin HEAD:agent/finish-nanobots-2.1-cleanup
