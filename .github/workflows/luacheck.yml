name: Apply Nanobots 2.1 port

on:
  push:
    branches:
      - agent/nanobots-2.1-continued
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify and apply complete port
        shell: bash
        run: |
          set -euo pipefail
          echo "467281e0cd64a77a0dd3134281fd99f59b5b89856fae2a2bae8a7165f834ce34  .port-payload/final.zip" | sha256sum --check
          rm -rf /tmp/nanobots-port
          mkdir -p /tmp/nanobots-port
          unzip -q .port-payload/final.zip -d /tmp/nanobots-port
          rsync -a /tmp/nanobots-port/files/ ./
          while IFS= read -r path; do
            [[ -n "$path" ]] && rm -rf -- "$path"
          done < /tmp/nanobots-port/delete.txt

      - name: Validate applied source
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes --quiet jq lua5.2
          test "$(jq -r .name info.json)" = "Nanobots2-continued"
          test "$(jq -r .factorio_version info.json)" = "2.1"
          jq -e '.dependencies | index("stdlib2-continued >= 2.1.0") != null' info.json >/dev/null
          while IFS= read -r -d '' file; do
            luac5.2 -p "$file"
          done < <(find . -type f -name '*.lua' -not -path './.git/*' -print0)
          if grep -RIn --exclude-dir=.git --exclude-dir=.github -E '__Nanobots2__/|__stdlib2__/' .; then
            echo "::error::Legacy mod import paths remain."
            exit 1
          fi

      - name: Commit completed port
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Port Nanobots continuation to Factorio 2.1"
          git push origin HEAD:agent/nanobots-2.1-continued
