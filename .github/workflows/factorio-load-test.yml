name: Factorio 2.1 load test

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  load:
    name: Load with ${{ matrix.configuration }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [base, space-age]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install --yes --quiet jq zip unzip rsync

      - name: Download Factorio 2.1 headless
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            https://factorio.com/get-download/experimental/headless/linux64 \
            --output factorio.tar.xz
          tar -xJf factorio.tar.xz

      - name: Prepare mods
        shell: bash
        env:
          CONFIGURATION: ${{ matrix.configuration }}
          FACTORIO_USERNAME: ${{ secrets.FACTORIO_USERNAME }}
          FACTORIO_TOKEN: ${{ secrets.FACTORIO_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${FACTORIO_USERNAME}" || -z "${FACTORIO_TOKEN}" ]]; then
            echo "::error::The Factorio load test requires repository secrets FACTORIO_USERNAME and FACTORIO_TOKEN to download kry_stdlib from the Mod Portal."
            exit 1
          fi

          name="$(jq -er '.name' info.json)"
          version="$(jq -er '.version' info.json)"
          package="${name}_${version}"
          mkdir -p "mods/${package}" dist
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.pdn/' \
            --exclude='mods/' \
            --exclude='dist/' \
            ./ "mods/${package}/"
          (cd mods && zip -qr "${package}.zip" "${package}")
          cp "mods/${package}.zip" "dist/${package}.zip"
          rm -rf "mods/${package}"

          minimum_kry_version="$(
            jq -er '
              .dependencies[]
              | select(test("^kry_stdlib\\s*>=\\s*[0-9]+\\.[0-9]+\\.[0-9]+$"))
              | capture(">=\\s*(?<version>[0-9]+\\.[0-9]+\\.[0-9]+)$").version
            ' info.json
          )"

          curl --fail --location --retry 3 \
            https://mods.factorio.com/api/mods/kry_stdlib/full \
            --output /tmp/kry-stdlib.json

          read -r kry_version kry_file_name kry_download_url < <(
            python3 - "${minimum_kry_version}" /tmp/kry-stdlib.json <<'PY'
          import json
          import sys

          minimum = tuple(int(part) for part in sys.argv[1].split("."))
          with open(sys.argv[2], encoding="utf-8") as handle:
              metadata = json.load(handle)

          candidates = []
          for release in metadata.get("releases", []):
              try:
                  version = tuple(int(part) for part in release["version"].split("."))
              except (KeyError, ValueError):
                  continue

              info = release.get("info_json") or {}
              if info.get("factorio_version") != "2.1" or version < minimum:
                  continue

              candidates.append((version, release))

          if not candidates:
              raise SystemExit(
                  f"No kry_stdlib release for Factorio 2.1 satisfies >= {sys.argv[1]}."
              )

          _, selected = max(candidates, key=lambda item: item[0])
          print(selected["version"], selected["file_name"], selected["download_url"])
          PY
          )

          echo "Using kry_stdlib ${kry_version} from the Factorio Mod Portal."

          curl --fail-with-body --location --retry 3 \
            --get \
            --data-urlencode "username=${FACTORIO_USERNAME}" \
            --data-urlencode "token=${FACTORIO_TOKEN}" \
            "https://mods.factorio.com${kry_download_url}" \
            --output "mods/${kry_file_name}"

          unzip -tq "mods/${kry_file_name}" >/dev/null
          embedded_info="$(unzip -Z1 "mods/${kry_file_name}" | grep -E '^[^/]+/info\.json$' | head -n 1)"
          test -n "${embedded_info}"
          test "$(unzip -p "mods/${kry_file_name}" "${embedded_info}" | jq -er '.name')" = "kry_stdlib"
          test "$(unzip -p "mods/${kry_file_name}" "${embedded_info}" | jq -er '.version')" = "${kry_version}"

          if [[ "${CONFIGURATION}" == "space-age" ]]; then
            enabled='["base","quality","elevated-rails","space-age","kry_stdlib","Nanobots2-continued"]'
          else
            enabled='["base","kry_stdlib","Nanobots2-continued"]'
          fi
          jq -n --argjson enabled "${enabled}" \
            '{mods: [$enabled[] | {name: ., enabled: true}]}' > mods/mod-list.json

      - name: Create test save
        id: factorio
        continue-on-error: true
        shell: bash
        env:
          CONFIGURATION: ${{ matrix.configuration }}
        run: |
          set -o pipefail
          timeout 180 factorio/bin/x64/factorio \
            --mod-directory "$PWD/mods" \
            --create "$PWD/test-save.zip" \
            2>&1 | tee "factorio-${CONFIGURATION}.log"

      - name: Collect Factorio logs
        if: always()
        shell: bash
        env:
          CONFIGURATION: ${{ matrix.configuration }}
        run: |
          set -euo pipefail
          mkdir -p factorio-logs
          cp "factorio-${CONFIGURATION}.log" "factorio-logs/" 2>/dev/null || true
          find factorio -maxdepth 3 -type f -name '*.log' -exec cp {} factorio-logs/ \; 2>/dev/null || true
          find . -maxdepth 3 -type f -name 'factorio-current.log' -exec cp {} factorio-logs/ \; 2>/dev/null || true

      - name: Upload Factorio logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: factorio-${{ matrix.configuration }}-logs
          path: factorio-logs/
          if-no-files-found: warn
          retention-days: 7

      - name: Fail when Factorio cannot load the mod
        if: steps.factorio.outcome == 'failure'
        run: |
          echo "::error::Factorio failed to create the ${{ matrix.configuration }} test save. See the uploaded log artifact."
          exit 1
