name: Factorio 2.1 load test

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  load:
    name: Load with ${{ matrix.configuration }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [base, space-age]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install --yes --quiet jq zip rsync

      - name: Download Factorio 2.1 headless
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            https://factorio.com/get-download/experimental/headless/linux64 \
            --output factorio.tar.xz
          tar -xJf factorio.tar.xz

      - name: Prepare mods
        shell: bash
        env:
          CONFIGURATION: ${{ matrix.configuration }}
        run: |
          set -euo pipefail
          name="$(jq -r .name info.json)"
          version="$(jq -r .version info.json)"
          package="${name}_${version}"
          mkdir -p "mods/${package}" dist
          rsync -a --exclude='.git/' --exclude='.github/' --exclude='.pdn/' --exclude='mods/' --exclude='dist/' ./ "mods/${package}/"
          (cd mods && zip -qr "${package}.zip" "${package}")
          cp "mods/${package}.zip" "dist/${package}.zip"
          rm -rf "mods/${package}"

          curl --fail --location --retry 3 \
            https://mods.factorio.com/api/mods/kry_stdlib/full \
            --output /tmp/kry-stdlib.json
          download_url="$(jq -er '.releases[] | select(.version == "2.2.4") | .download_url' /tmp/kry-stdlib.json)"
          curl --fail --location --retry 3 \
            "https://mods.factorio.com${download_url}" \
            --output mods/kry_stdlib_2.2.4.zip

          if [[ "$CONFIGURATION" == "space-age" ]]; then
            enabled='["base","quality","elevated-rails","space-age","kry_stdlib","Nanobots2-continued"]'
          else
            enabled='["base","kry_stdlib","Nanobots2-continued"]'
          fi
          jq -n --argjson enabled "$enabled" \
            '{mods: [$enabled[] | {name: ., enabled: true}]}' > mods/mod-list.json

      - name: Create test save
        id: factorio
        continue-on-error: true
        shell: bash
        env:
          CONFIGURATION: ${{ matrix.configuration }}
        run: |
          set -o pipefail
          timeout 180 factorio/bin/x64/factorio \
            --mod-directory "$PWD/mods" \
            --create "$PWD/test-save.zip" \
            2>&1 | tee "factorio-${CONFIGURATION}.log"

      - name: Collect Factorio logs
        if: always()
        shell: bash
        env:
          CONFIGURATION: ${{ matrix.configuration }}
        run: |
          set -euo pipefail
          mkdir -p factorio-logs
          cp "factorio-${CONFIGURATION}.log" "factorio-logs/" 2>/dev/null || true
          find factorio -maxdepth 3 -type f -name '*.log' -exec cp {} factorio-logs/ \; 2>/dev/null || true
          find . -maxdepth 3 -type f -name 'factorio-current.log' -exec cp {} factorio-logs/ \; 2>/dev/null || true

      - name: Upload Factorio logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: factorio-${{ matrix.configuration }}-logs
          path: factorio-logs/
          if-no-files-found: warn
          retention-days: 7

      - name: Fail when Factorio cannot load the mod
        if: steps.factorio.outcome == 'failure'
        run: |
          echo "::error::Factorio failed to create the ${{ matrix.configuration }} test save. See the uploaded log artifact."
          exit 1
